services:
  ollama:
    image: ollama/ollama:latest
    container_name: finscope_ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped

  api:
    build: .
    container_name: finscope_api
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - OLLAMA_BASE_URL=http://finscope_ollama:11434
    volumes:
      - ./chroma_db:/app/chroma_db
    depends_on:
      - ollama
    command: python -m uvicorn src.api.main:app --host 0.0.0.0 --port 8000
    restart: unless-stopped

  ui:
    build: .
    container_name: finscope_ui
    ports:
      - "8501:8501"
    env_file:
      - .env
    environment:
      - API_URL=http://finscope_api:8000
    depends_on:
      - api
    command: python -m streamlit run ui/app.py --server.port 8501 --server.address 0.0.0.0
    restart: unless-stopped

volumes:
  ollama_data:
